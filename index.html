<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Development</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="heading">
        <h2>Web Development Workshop</h2>
        <p>Number of available seats : <span>23</span></p>
      </div>

      <div class="formContainer">
        <div class="left">
          <img src="./image.jpg" alt="" />
        </div>

        <div class="right">
          <form action="">
            <div class="inputbox">
              <i class="fa-regular fa-user"></i>
              <input type="text" placeholder="Username" />
            </div>
            <div class="inputbox">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" placeholder="Email" />
            </div>

            <div class="inputbox">
              <i class="fa-solid fa-phone"></i>
              <input type="tel" placeholder="Phone No" />
            </div>

            <div class="inputbox">
              <i class="fa-solid fa-chair"></i>
              <input type="number" placeholder="Choose no of seats" />
            </div>

            <div class="inputbox">
              <i class="fa-regular fa-user"></i>
              <input type="text" placeholder="Second username" />
            </div>
            <div class="button">
              <button type="submit" class="subbtn">Submit</button>
              <button type="reset" class="canbtn">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
